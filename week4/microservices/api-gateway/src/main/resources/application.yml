server:
  port: 8085
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: account_route
          uri: lb://account-service
          predicates:
            - Path=/accounts/**
        - id: loan_route
          uri: lb://loan-service
          predicates:
            - Path=/loans/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
